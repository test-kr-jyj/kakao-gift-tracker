name: 카카오 선물하기 랭킹 수집

# 언제 실행할지
on:
  schedule:
    - cron: "17,47 * * * *"  # 매시 17분·47분(한산한 시각). 한 번 건너뛰어도 다른 한 번이 커버 → 구멍 최소화.
  workflow_dispatch:          # 깃허브에서 "Run workflow" 버튼으로 수동 실행 (첫 보정용)
    inputs:
      debug:
        description: "디버그 모드로 실행 (처음 1회 데이터 구조 확인용)"
        type: boolean
        default: false

# 수집한 데이터를 저장소에 다시 커밋하려면 쓰기 권한 필요
permissions:
  contents: write

# 같은 시각 중복 실행 방지
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 브라우저(크로미움) 설치
        run: python -m playwright install --with-deps chromium

      - name: 랭킹 수집 실행
        run: |
          if [ "${{ inputs.debug }}" = "true" ]; then
            python collector.py --debug
          else
            python collector.py
          fi

      - name: 수집 결과 저장(커밋)
        run: |
          git config user.name  "kakao-gift-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data debug 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 사항 없음 (저장 생략)"
          else
            git commit -m "랭킹 수집: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
